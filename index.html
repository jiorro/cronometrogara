<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Race Engineer</title>

<style>

body{
    background:#0f1116;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
    color:#00ff9c;
}

#time{
    font-size:80px;
    margin:30px;
    font-weight:bold;
}

#totalTime{
    position:absolute;
    left:20px;
    top:20px;
    font-size:18px;
}

#lapCounter{
    position:absolute;
    right:20px;
    top:20px;
    font-size:18px;
}

button{
    padding:12px 25px;
    font-size:16px;
    background:#00ff9c;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#00cc7a;
}

#log{
    margin:40px auto;
    width:70%;
    background:#161a22;
    padding:20px;
    border-radius:10px;
    text-align:left;
    height:200px;
    overflow:auto;
}

</style>
</head>

<body>

<h1>Race Engineer</h1>

<div id="totalTime">Total: 00:00.000</div>
<div id="lapCounter">Lap: 0</div>

<div id="time">00:00.000</div>

<button id="startMic">🎤 Attiva Microfono</button>

<div id="log"></div>

<script>

let startTime=null
let totalStartTime=null

let timerInterval=null
let totalTimerInterval=null

let laps=[]
let checkmarks=[]

let muteMode=false
let currentLap=0

let micStarted=false
let audioPlaying=false
let firstReminderDone=false


function playSound(file){

 const s=new Audio(file)

 audioPlaying=true

 s.onended=()=>audioPlaying=false
 s.onerror=()=>audioPlaying=false

 s.play().catch(()=>audioPlaying=false)

}


function updateTimer(){

 if(startTime===null)return

 const elapsed=Date.now()-startTime

 const m=Math.floor(elapsed/60000)
 const s=Math.floor((elapsed%60000)/1000)
 const ms=Math.floor(elapsed%1000)

 document.getElementById("time").textContent=

 String(m).padStart(2,"0")+":"+
 String(s).padStart(2,"0")+"."+
 String(ms).padStart(3,"0")

}


function updateTotalTimer(){

 if(totalStartTime===null)return

 const elapsed=Date.now()-totalStartTime

 const m=Math.floor(elapsed/60000)
 const s=Math.floor((elapsed%60000)/1000)
 const ms=Math.floor(elapsed%1000)

 document.getElementById("totalTime").textContent=
 "Total: "+String(m).padStart(2,"0")+":"+
 String(s).padStart(2,"0")+"."+
 String(ms).padStart(3,"0")

}


function startTimer(){

 if(totalStartTime===null){

 totalStartTime=Date.now()

 totalTimerInterval=setInterval(updateTotalTimer,100)

 }

 startTime=Date.now()

 clearInterval(timerInterval)
 timerInterval=setInterval(updateTimer,100)

 playSound("starttime (1).mp3")

 log("Timer started")

}


function stopTimer(){

 if(startTime===null)return

 clearInterval(timerInterval)

 const elapsed=Date.now()-startTime

 const hadLaps=laps.length>0

 const best=hadLaps?Math.min(...laps):Infinity
 const worst=hadLaps?Math.max(...laps):-Infinity

 laps.push(elapsed)

 const m=Math.floor(elapsed/60000)
 const s=((elapsed%60000)/1000).toFixed(2)

 currentLap++
 updateLapCounter()

 if(!muteMode){

 if(!hadLaps || elapsed<=best){

 setTimeout(()=>playSound("Record (online-voice-recorder (1).mp3"),200)
 log(`Best lap ${m}m ${s}s`)

 }
 else if(elapsed>=worst){

 setTimeout(()=>playSound("worst lap.mp3"),200)
 log(`Worst lap ${m}m ${s}s`)

 }
 else{

 setTimeout(()=>playSound("normal lap time.mp3"),200)
 log(`Lap ${m}m ${s}s`)

 }

 }

 startTime=Date.now()
 timerInterval=setInterval(updateTimer,100)

}


function markMoment(){

 if(startTime===null)return

 const moment=Date.now()-startTime

 checkmarks.push({
 time:moment,
 lastLapTriggered:-1
 })

 if(!muteMode){

 if(!firstReminderDone){

 firstReminderDone=true

 }else{

 playSound("lap reminder_.mp3")

 }

 }

 log("Checkpoint "+(moment/1000).toFixed(2)+"s")

}


function log(msg){

 const logBox=document.getElementById("log")

 logBox.innerHTML+=msg+"<br>"

 logBox.scrollTop=logBox.scrollHeight

}


function speak(text){

 const u=new SpeechSynthesisUtterance(text)

 u.lang="it-IT"

 speechSynthesis.speak(u)

}



function initSpeech(){

 if(micStarted)return
 micStarted=true

 const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

 const recognition=new SpeechRecognition()

 recognition.lang="it-IT"
 recognition.continuous=true
 recognition.interimResults=false

 recognition.onresult=(event)=>{

 const text=event.results[event.results.length-1][0].transcript
 .trim()
 .toLowerCase()

 log("Voice: "+text)


 if(["via","start","go","begin","avvia","parti"].some(w=>text.includes(w)))
 startTimer()

 else if(["stop","fine","end","ferma"].some(w=>text.includes(w)))
 stopTimer()

 else if(["segna","mark","checkpoint","ricorda"].some(w=>text.includes(w)))
 markMoment()

 else if(["mute","silenzio","quiet"].some(w=>text.includes(w))){
 muteMode=true
 log("Mute mode")
 }

 else if(["tempo totale","total time","race time","tempo gara"].some(w=>text.includes(w))){

 if(totalStartTime===null){
 speak("Il timer non è partito")
 return
 }

 const elapsed=Date.now()-totalStartTime

 const m=Math.floor(elapsed/60000)
 const s=Math.floor((elapsed%60000)/1000)

 speak(`${m} minutes ${s} seconds`)

 }

 else if(["giri","laps","lap count","numero giri"].some(w=>text.includes(w))){

 speak(`You completed ${currentLap} laps`)

 }

 }

 recognition.onend=()=>{
 if(!audioPlaying)
 setTimeout(()=>recognition.start(),300)
 }

 recognition.start()

}

document.getElementById("startMic").onclick=initSpeech


function updateLapCounter(){
 document.getElementById("lapCounter").textContent="Lap: "+currentLap
}


setInterval(()=>{

 if(startTime===null)return

 const elapsed=Date.now()-startTime

 checkmarks.forEach(mark=>{

 if(!muteMode && mark.lastLapTriggered<currentLap){

 if(Math.abs(elapsed-mark.time)<300){

 playSound("lap reminder_.mp3")

 mark.lastLapTriggered=currentLap

 }

 }

 })

},200)

</script>

</body>
</html>
