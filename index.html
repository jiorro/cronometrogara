<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<title>Race Engineer</title>

<style>

body{
background:#0f1116;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
color:#00ff9c;
}

#time{
font-size:80px;
margin:30px;
font-weight:bold;
}

#totalTime{
position:absolute;
left:20px;
top:20px;
font-size:18px;
}

#lapCounter{
position:absolute;
right:20px;
top:20px;
font-size:18px;
}

button{
padding:12px 25px;
font-size:16px;
background:#00ff9c;
border:none;
border-radius:6px;
cursor:pointer;
}

#log{
margin:40px auto;
width:70%;
background:#161a22;
padding:20px;
border-radius:10px;
text-align:left;
height:200px;
overflow:auto;
}

</style>
</head>

<body>

<h1>Race Engineer</h1>

<div id="totalTime">Total: 00:00.000</div>
<div id="lapCounter">Lap: 0</div>

<div id="time">00:00.000</div>

<button id="startMic">🎤 Attiva Microfono</button>

<div id="log"></div>

<script>

/* ------------------- VARIABILI ------------------- */

let startTime=null
let totalStartTime=null

let timerInterval=null
let totalTimerInterval=null

let laps=[]
let checkmarks=[]

let muteMode=false
let currentLap=0

let micStarted=false
let audioPlaying=false

let firstReminderDone=false

/* ------------------- AUDIO ------------------- */

function playSound(file){

 const s=new Audio(file)

 audioPlaying=true

 s.onended=()=>audioPlaying=false
 s.onerror=()=>audioPlaying=false

 s.play().catch(()=>audioPlaying=false)

}

/* ------------------- TIMER ------------------- */

function updateTimer(){

 if(startTime===null)return

 const elapsed=Date.now()-startTime

 const m=Math.floor(elapsed/60000)
 const s=Math.floor((elapsed%60000)/1000)
 const ms=Math.floor(elapsed%1000)

 document.getElementById("time").textContent=

 String(m).padStart(2,"0")+":"+
 String(s).padStart(2,"0")+"."+
 String(ms).padStart(3,"0")

}

function updateTotalTimer(){

 if(totalStartTime===null)return

 const elapsed=Date.now()-totalStartTime

 const m=Math.floor(elapsed/60000)
 const s=Math.floor((elapsed%60000)/1000)
 const ms=Math.floor(elapsed%1000)

 document.getElementById("totalTime").textContent=
 "Total: "+
 String(m).padStart(2,"0")+":"+
 String(s).padStart(2,"0")+"."+
 String(ms).padStart(3,"0")

}

/* ------------------- START ------------------- */

function startTimer(){

 if(totalStartTime===null){

 totalStartTime=Date.now()

 totalTimerInterval=setInterval(updateTotalTimer,100)

 }

 startTime=Date.now()

 clearInterval(timerInterval)
 timerInterval=setInterval(updateTimer,100)

 playSound("starttime (1).mp3")

 log("Timer started")

}

/* ------------------- STOP ------------------- */

function stopTimer(){

 if(startTime===null)return

 clearInterval(timerInterval)

 const elapsed=Date.now()-startTime

 const hadLaps=laps.length>0

 const best=hadLaps?Math.min(...laps):Infinity
 const worst=hadLaps?Math.max(...laps):-Infinity

 laps.push(elapsed)

 const m=Math.floor(elapsed/60000)
 const s=((elapsed%60000)/1000).toFixed(2)

 currentLap++
 updateLapCounter()

 if(!muteMode){

 if(!hadLaps || elapsed<=best){

 setTimeout(()=>playSound("Record (online-voice-recorder (1).mp3"),200)
 log("Best lap")

 }

 else if(elapsed>=worst){

 setTimeout(()=>playSound("worst lap.mp3"),200)
 log("Worst lap")

 }

 else{

 setTimeout(()=>playSound("normal lap time.mp3"),200)
 log("Lap recorded")

 }

 }

 startTime=Date.now()
 timerInterval=setInterval(updateTimer,100)

}

/* ------------------- MARK ------------------- */

function markMoment(){

 if(startTime===null)return

 const moment=Date.now()-startTime

 checkmarks.push({
 time:moment,
 lastLapTriggered:-1
 })

 if(!muteMode){

 if(firstReminderDone)
 playSound("lap reminder_.mp3")

 firstReminderDone=true

 }

 log("Checkpoint "+(moment/1000).toFixed(2))

}

/* ------------------- LOG ------------------- */

function log(msg){

 const box=document.getElementById("log")

 box.innerHTML+=msg+"<br>"

 box.scrollTop=box.scrollHeight

}

/* ------------------- FUZZY MATCH VELOCE ------------------- */

function fuzzyMatch(text,commands){

 const words=text.split(" ")

 for(const word of words){

 for(const cmd of commands){

 if(word===cmd) return true

 if(word.startsWith(cmd.slice(0,3))) return true

 if(Math.abs(word.length-cmd.length)<=1 &&
 word.includes(cmd.slice(0,2)))
 return true

 }

 }

 return false

}

/* ------------------- MICROFONO ------------------- */

function initSpeech(){

 if(micStarted)return
 micStarted=true

 const SpeechRecognition=
 window.SpeechRecognition||window.webkitSpeechRecognition

 if(!SpeechRecognition){

 alert("SpeechRecognition non supportato")

 return
 }

 const recognition=new SpeechRecognition()

 recognition.lang="it-IT"
 recognition.continuous=true
 recognition.interimResults=true

 recognition.onresult=(event)=>{

 const text=
 event.results[event.results.length-1][0]
 .transcript
 .trim()
 .toLowerCase()

 log("Voice: "+text)

 if(fuzzyMatch(text,
 ["start","via","go","begin","parti","avvia"]))
 startTimer()

 else if(fuzzyMatch(text,
 ["stop","fine","end","ferma"]))
 stopTimer()

 else if(fuzzyMatch(text,
 ["segna","mark","checkpoint","ricorda"]))
 markMoment()

 else if(fuzzyMatch(text,
 ["mute","silenzio","quiet"])){

 muteMode=true
 log("Mute mode")

 }

 else if(fuzzyMatch(text,
 ["laps","giri","lap"])){

 speak("You completed "+currentLap+" laps")

 }

 }

 recognition.onend=()=>{

 if(!audioPlaying)
 setTimeout(()=>recognition.start(),50)

 }

 recognition.start()

}

document.getElementById("startMic").onclick=initSpeech

/* ------------------- VOCE ------------------- */

function speak(text){

 const u=new SpeechSynthesisUtterance(text)

 u.lang="en-US"

 speechSynthesis.speak(u)

}

/* ------------------- GIRI ------------------- */

function updateLapCounter(){

 document.getElementById("lapCounter").textContent=
 "Lap: "+currentLap

}

/* ------------------- REMINDER ------------------- */

setInterval(()=>{

 if(startTime===null)return

 const elapsed=Date.now()-startTime

 checkmarks.forEach(mark=>{

 if(!muteMode && mark.lastLapTriggered<currentLap){

 if(Math.abs(elapsed-mark.time)<300){

 playSound("lap reminder_.mp3")

 mark.lastLapTriggered=currentLap

 }

 }

 })

},200)

</script>

</body>
</html>
